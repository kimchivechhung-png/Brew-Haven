<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login • Brew Haven</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="theme-sand two-panel">
  <aside class="illustration-panel">
    <!-- left illustration -->
    <div class="illust-card">
      <img src="images/people.png" alt="Login illustration" class="side-illustration">
    </div>

  </aside>

  <main class="panel">
    <header class="panel-header">
      <a class="brand" href="index.html">BREW HAVEN</a>
      <nav class="panel-nav">
        <a href="index.html">Home</a>
        <a href="index.html#coffee">Coffee</a>
        <a href="index.html#bakery">Bakery</a>
        <a href="index.html#shop">Shop</a>
        <a href="about.html">About</a>
        <a href="register.html">Register</a>
        <a class="active" href="login.html">Login</a>
      </nav>
    </header>

    <section class="panel-body narrow">
      <h1 class="center">LOGIN</h1>
      
      <form id="loginForm" class="form">
  <label>Email
    <input id="loginEmail" type="email" autocomplete="email" required />
  </label>
  <label>Password
    <input id="loginPassword" type="password" required />
  </label>

<p class="tiny muted" style="text-align:right">
    <a href="#" id="forgotPasswordLink">Forgot password?</a>
  </p>

  <p id="loginError" class="tiny" style="display:none;color:#a52834;"></p>
  <button class="btn btn-primary block" type="submit">Log In</button>
  
<!-- ✅ Google sign in (optional but recommended) -->
  <div class="hr-or"><span>or</span></div>

  <button
    type="button"
    class="btn btn-outline icon-left block"
    id="googleLoginBtn"
  >
    <img src="images/google.png" alt="Google logo" />
    Sign in with Google
  </button>

  <p class="center tiny muted">
  Don’t have an account?
  <a href="register.html">Create one</a>
</p>
</form>
    </section>
  </main>
  <script src="js/script.js"></script>
  

<!-- Your auth logic -->
<script type="module" src="js/auth.js"></script>
</body>
</html>
