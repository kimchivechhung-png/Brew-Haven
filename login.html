<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login • Brew Haven</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="theme-sand two-panel">
  <aside class="illustration-panel">
    <!-- left illustration -->
    <div class="illust-card">
      <img src="images/people.png" alt="Login illustration" class="side-illustration">
    </div>

  </aside>

  <main class="panel">
    <header class="panel-header">
      <a class="brand" href="index.html">BREW HAVEN</a>
      <nav class="panel-nav">
        <a href="index.html">Home</a>
        <a href="index.html#coffee">Coffee</a>
        <a href="index.html#bakery">Bakery</a>
        <a href="index.html#shop">Shop</a>
        <a href="about.html">About</a>
        <a class="active" href="login.html">Login</a>
      </nav>
    </header>

    <section class="panel-body narrow">
      <h1 class="center">LOGIN</h1>
      <form class="form" action="#" onsubmit="return false;">
        <label>Username or Email Address
          <input type="email" required placeholder="you@example.com" />
        </label>
        <label>Password
          <input type="password" required placeholder="••••••••" />
        </label>
        <div class="form-row between">
          <a class="muted tiny" href="#">Forgotten password?</a>
        </div>
        <button class="btn btn-primary block">Log In</button>

        <div class="hr-or"><span>or</span></div>

        <div class="auth-row">
          <button class="btn btn-outline icon-left">
            <img src="images/facebook.png" alt="">
            Sign in with Facebook
          </button>
          <button class="btn btn-outline icon-left">
            <img src="images/google.png" alt="">
            Sign in with Google
          </button>
        </div>

        <p class="center tiny muted">
          Don’t have an account? <a href="register.html">Sign up</a>
        </p>
      </form>
    </section>
  </main>
  <script src="js/script.js"></script>
</body>
</html>
