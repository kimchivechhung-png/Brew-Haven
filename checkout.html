<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout • Brew Haven</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="theme-sand two-panel">
  <aside class="illustration-panel">
    <div class="illust-card">
      <img src="images/people.png" alt="Checkout illustration" class="side-illustration">
    </div>
  </aside>

  <main class="panel">
    <header class="panel-header">
      <a class="brand" href="index.html">BREW HAVEN</a>
      <nav class="panel-nav">
        <a href="index.html">Home</a>
        <a href="index.html#coffee">Coffee</a>
        <a href="index.html#bakery">Bakery</a>
        <a href="index.html#shop">Shop</a>
        <a href="about.html">About</a>
        <a href="login.html">Login</a>
      </nav>
    </header>
<section class="panel-body narrow">
  <h1>Your basket</h1>

  <!-- ✅ Dynamic cart items -->
  <div id="cartItems"></div>

  <form class="form" onsubmit="return false;">
    <div class="grid-2 gap">
      <label>Your name
        <input type="text" required />
      </label>
      <label>Phone number
        <input type="tel" required />
      </label>
    </div>

    <label>Address
      <input type="text" required />
    </label>

    <label>Note
      <input type="text" />
    </label>

    <fieldset class="fieldset">
      <legend>Payment Details</legend>
      <label>Order
        <select>
          <option>Delivery</option>
          <option>Pickup</option>
        </select>
      </label>
      <label>Total
        <input id="orderTotal" type="text" value="0.00" readonly />
      </label>
    </fieldset>

    <button
      class="btn btn-primary block"
      type="button"
      onclick="payNow()"
    >
    <p class="muted tiny">
       This is a demo payment. No real money will be charged.
      </p>
      Pay Now
    </button>
  </form>
</section>
  </main>
  <script src="js/script.js"></script>
  <script src="js/cart.js"></script>
  <script>
  function renderCart() {
    const cart = getCart();
    const container = document.getElementById("cartItems");
    const totalInput = document.getElementById("orderTotal");

    if (!cart || cart.length === 0) {
      container.innerHTML = "<p>Your cart is empty.</p>";
      totalInput.value = "0.00";
      return;
    }

    let total = 0;

    container.innerHTML = cart.map(item => {
      const itemTotal = item.price * item.qty;
      total += itemTotal;

      return `
        <div class="cart-line">
          <strong>${item.name}</strong>
          <div class="qty">
            <button onclick="changeQty('${item.name}', -1)">−</button>
            ${item.qty}
            <button onclick="changeQty('${item.name}', 1)">+</button>
          </div>
          <span>$${itemTotal.toFixed(2)}</span>
        </div>
      `;
    }).join("");

    totalInput.value = total.toFixed(2);
  }

  function payNow() {
    const cart = getCart();
    if (!cart.length) {
      alert("Your cart is empty.");
      return;
    }

    localStorage.removeItem("cart");
    window.location.href = "success.html";
  }

  // ✅ THIS IS CRITICAL
  renderCart();
</script>
</body>
</html>
