<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Account • Brew Haven</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="theme-sand two-panel">
  <aside class="illustration-panel">
    <!-- left illustration -->
    <div class="illust-card">
      <img src="images/people.png" alt="Register illustration" class="side-illustration">
    </div>
  </aside>

  <main class="panel">
    <header class="panel-header">
      <a class="brand" href="index.html">BREW HAVEN</a>
      <nav class="panel-nav">
        <a href="index.html">Home</a>
        <a href="index.html#coffee">Coffee</a>
        <a href="index.html#bakery">Bakery</a>
        <a href="index.html#shop">Shop</a>
        <a href="about.html">About</a>
        <a href="login.html">Login</a>
      </nav>
    </header>

    <section class="panel-body narrow">
      <h1>Create Account</h1>

      <form class="form" action="#" onsubmit="return false;">
        <div class="grid-2 gap">
          <label>First Name
            <input type="text" required />
          </label>
          <label>Last Name
            <input type="text" required />
          </label>
        </div>

        <label>Email
          <input type="email" required />
        </label>

        <label>Password
          <input type="password" required minlength="6" />
        </label>

        <button class="btn btn-primary block">Create Account</button>

        <p class="tiny muted">Already have an account?
          <a href="login.html">Log in</a>
        </p>

        <div class="hr-or"><span>or</span></div>

        <div class="auth-row">
          <button class="btn btn-outline icon-left">
            <img src="images/facebook.png" alt="">
            Sign up with Facebook
          </button>
          <button class="btn btn-outline icon-left">
            <img src="images/google.png" alt="">
            Sign up with Google
          </button>
        </div>
      </form>
    </section>
  </main>
  <script src="js/script.js"></script>
</body>
</html>
