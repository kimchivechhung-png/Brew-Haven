  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="theme-sand two-panel">
  <aside class="illustration-panel">
    <!-- left illustration -->
    <div class="illust-card">
      <img src="images/people.png" alt="Register illustration" class="side-illustration">
    </div>
  </aside>

  <main class="panel">
    <header class="panel-header">
      <a class="brand" href="index.html">BREW HAVEN</a>
      <nav class="panel-nav">
        <a href="index.html">Home</a>
        <a href="index.html#coffee">Coffee</a>

        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
      </nav>
    </header>

    <section class="panel-body narrow">
      <h1>Create Account</h1>
      <form id="registerForm" class="form">
  <div class="grid-2 gap">
    <label>Full Name
      <input id="regName" type="text" required />
    </label>
    <label>Email
      <input id="regEmail" type="email" autocomplete="email" required />
    </label>
  </div>
  <label>Password
    <input id="regPassword" type="password" minlength="6" required />
  </label>

  <p id="regError" class="tiny" style="display:none;color:#a52834;"></p>
  <button class="btn btn-primary block" type="submit">Create Account</button>
</form>
    </section>
  </main>
  <script src="js/script.js"></script>
  <!-- Firebase SDKs (ESM, from CDN) -->
<!-- Your auth logic -->
<script type="module" src="js/auth.js"></script>
</body>
